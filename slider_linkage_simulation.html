<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曲柄滑塊機構軌跡模擬</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        #controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #fff;
            flex-wrap: wrap; /* 允許換行以適應小螢幕 */
        }
        .control-group {
            display: flex;
            flex-direction: column;
            width: 150px;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="range"] {
            width: 100%;
        }
        #canvasContainer {
            border: 2px solid #333;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        #canvas {
            display: block; /* 移除可能的底線空白 */
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        #toggleTrace {
            background-color: #007bff;
            color: white;
        }
        #toggleTrace:hover {
            background-color: #0056b3;
        }
        #clearTrace {
            background-color: #dc3545;
            color: white;
        }
        #clearTrace:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <h1>📐 曲柄滑塊機構動作軌跡模擬</h1>

    <div id="controls">
        <div class="control-group">
            <label for="crankLength">曲柄長度 (R): <span id="crankValue"></span></label>
            <input type="range" id="crankLength" min="30" max="100" value="50" step="1">
        </div>
        <div class="control-group">
            <label for="conrodLength">連桿長度 (L): <span id="conrodValue"></span></label>
            <input type="range" id="conrodLength" min="100" max="250" value="200" step="1">
        </div>
        <div class="control-group">
            <label for="speed">轉速 (deg/frame): <span id="speedValue"></span></label>
            <input type="range" id="speed" min="0.5" max="5" value="1.5" step="0.1">
        </div>
        <div class="control-group">
            <button id="toggleTrace">啟用/暫停軌跡記錄</button>
            <button id="clearTrace">清除軌跡</button>
        </div>
    </div>

    <div id="canvasContainer">
        <canvas id="canvas" width="600" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        const centerX = W / 4; // 曲柄中心設置在左側
        const centerY = H / 2;

        // 參數變數
        let R = 50; // 曲柄長度 (R)
        let L = 200; // 連桿長度 (L)
        let angle = 0; // 曲柄角度 (以度為單位)
        let angularSpeed = 1.5; // 角速度 (度/幀)
        let tracePoints = []; // 軌跡點陣列
        let isTracing = true; // 紀錄軌跡的開關

        // --- 數學計算函數 ---
        /**
         * 計算曲柄滑塊機構中滑塊的位置 (x, y)。
         * 使用單偏置 (In-line) 曲柄滑塊機構公式。
         * @param {number} R_crank 曲柄長度。
         * @param {number} L_conrod 連桿長度。
         * @param {number} theta 曲柄角度 (以弧度為單位)。
         * @returns {{x: number, y: number}} 滑塊的位置 (相對於曲柄中心)。
         */
        function calculateSliderPosition(R_crank, L_conrod, theta) {
            // 曲柄端點 B 的座標
            const Bx = R_crank * Math.cos(theta);
            const By = R_crank * Math.sin(theta);

            // 連桿長度 L_conrod
            // 從 Bx 到滑塊 S 的水平距離 (x)
            // L^2 = (Sx - Bx)^2 + By^2
            // L^2 - By^2 = (Sx - Bx)^2
            // Sx - Bx = sqrt(L^2 - By^2)
            // Sx = Bx + sqrt(L^2 - By^2)
            
            // 檢查 L >= |By| 確保連桿有足夠長度
            const radical = L_conrod * L_conrod - By * By;
            if (radical < 0) {
                // 如果連桿不夠長，則返回錯誤值或停止動畫
                return { x: Bx, y: 0 }; // 簡化處理，直接返回曲柄端點X
            }

            const sqrtTerm = Math.sqrt(radical);
            
            // 滑塊 S 的座標 (假設滑塊在水平軌道上, y=0)
            const Sx = Bx + sqrtTerm; 
            
            // 在此模擬中，我們假設滑塊的y座標為0，即在水平軌道上
            return { x: Sx, y: 0 };
        }

        // --- 繪圖函數 ---
        
        /** 繪製連桿和滑塊 */
        function drawMechanism(angle_rad) {
            // 1. 計算所有關鍵點座標 (轉換到 canvas 座標系)
            // A: 曲柄中心
            const Ax = centerX;
            const Ay = centerY;

            // B: 曲柄端點
            const Bx = Ax + R * Math.cos(angle_rad);
            const By = Ay - R * Math.sin(angle_rad); // Y軸反轉

            // S: 滑塊中心
            const { x: Sx_rel, y: Sy_rel } = calculateSliderPosition(R, L, angle_rad);
            const Sx = Ax + Sx_rel; // Sx_rel 是相對 Ax 的水平距離
            const Sy = Ay; // 滑塊在水平軌道上，Y座標保持不變

            // 2. 繪製曲柄 (A->B)
            ctx.beginPath();
            ctx.moveTo(Ax, Ay);
            ctx.lineTo(Bx, By);
            ctx.strokeStyle = '#007bff';
            ctx.lineWidth = 8;
            ctx.stroke();

            // 3. 繪製連桿 (B->S)
            ctx.beginPath();
            ctx.moveTo(Bx, By);
            ctx.lineTo(Sx, Sy);
            ctx.strokeStyle = '#28a745';
            ctx.lineWidth = 6;
            ctx.stroke();

            // 4. 繪製滑塊 (以 S 為中心)
            const sliderWidth = 30;
            const sliderHeight = 40;
            ctx.fillStyle = '#dc3545';
            ctx.fillRect(Sx - sliderWidth / 2, Sy - sliderHeight / 2, sliderWidth, sliderHeight);
            ctx.strokeStyle = '#a00';
            ctx.lineWidth = 2;
            ctx.strokeRect(Sx - sliderWidth / 2, Sy - sliderHeight / 2, sliderWidth, sliderHeight);

            // 5. 繪製曲柄中心 (A)
            ctx.beginPath();
            ctx.arc(Ax, Ay, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#333';
            ctx.fill();

            // 6. 繪製連桿鉸接點 (B)
            ctx.beginPath();
            ctx.arc(Bx, By, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#333';
            ctx.fill();

            // 7. 繪製軌道線
            ctx.beginPath();
            ctx.moveTo(0, Ay);
            ctx.lineTo(W, Ay);
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]); // 虛線
            ctx.stroke();
            ctx.setLineDash([]); // 恢復實線

            // 8. 記錄軌跡點 (滑塊 S 的位置)
            if (isTracing) {
                tracePoints.push({ x: Sx, y: Sy });
                // 限制軌跡點數，避免記憶體過大
                if (tracePoints.length > 360 * 3) {
                     tracePoints.shift();
                }
            }
        }
        
        /** 繪製軌跡 */
        function drawTrace() {
            if (tracePoints.length < 2) return;

            // 繪製滑塊的軌跡 (水平直線)
            ctx.beginPath();
            ctx.moveTo(tracePoints[0].x, tracePoints[0].y);
            for (let i = 1; i < tracePoints.length; i++) {
                ctx.lineTo(tracePoints[i].x, tracePoints[i].y);
            }
            ctx.strokeStyle = '#ffc107'; // 軌跡顏色
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // --- 動畫迴圈 ---
        function animate() {
            // 清除畫布
            ctx.clearRect(0, 0, W, H);

            // 繪製軌跡 (在機構之前繪製，使其在底部)
            drawTrace();

            // 計算當前角度 (轉換為弧度)
            const angle_rad = (angle * Math.PI) / 180;
            
            // 繪製機構
            drawMechanism(angle_rad);

            // 更新角度
            angle = (angle + angularSpeed) % 360;

            // 請求下一幀動畫
            requestAnimationFrame(animate);
        }

        // --- 介面控制 ---

        const crankInput = document.getElementById('crankLength');
        const conrodInput = document.getElementById('conrodLength');
        const speedInput = document.getElementById('speed');
        const crankValueSpan = document.getElementById('crankValue');
        const conrodValueSpan = document.getElementById('conrodValue');
        const speedValueSpan = document.getElementById('speedValue');
        const toggleTraceBtn = document.getElementById('toggleTrace');
        const clearTraceBtn = document.getElementById('clearTrace');

        function updateLabels() {
            crankValueSpan.textContent = R;
            conrodValueSpan.textContent = L;
            speedValueSpan.textContent = angularSpeed.toFixed(1);
        }

        // 綁定事件監聽器
        crankInput.addEventListener('input', (e) => {
            R = parseInt(e.target.value);
            updateLabels();
        });

        conrodInput.addEventListener('input', (e) => {
            L = parseInt(e.target.value);
            // 檢查連桿長度是否大於曲柄長度 (R) 避免機構鎖死
            if (L < R) {
                L = R; // 至少等於 R 避免 NaN 情況
                e.target.value = R;
            }
            updateLabels();
        });
        
        speedInput.addEventListener('input', (e) => {
            angularSpeed = parseFloat(e.target.value);
            updateLabels();
        });
        
        toggleTraceBtn.addEventListener('click', () => {
            isTracing = !isTracing;
            toggleTraceBtn.textContent = isTracing ? '暫停軌跡記錄' : '啟用軌跡記錄';
            toggleTraceBtn.style.backgroundColor = isTracing ? '#dc3545' : '#007bff';
        });

        clearTraceBtn.addEventListener('click', () => {
            tracePoints = []; // 清空軌跡
        });


        // 初始化標籤顯示
        updateLabels(); 

        // 啟動動畫
        animate();
    </script>

</body>
</html>
